name: Cross-Implementation Verification

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# go-qrllib is pinned to an explicit commit so upstream changes cannot
# silently alter what "verification passed" means (and cannot break this
# job on unrelated upstream churn — qrypto.js's dilithium5 cross-verify
# broke exactly this way when go-qrllib v0.9.0 removed crypto/dilithium).
# Bump deliberately: update the SHA + date, then run this workflow via
# workflow_dispatch before merging.
env:
  GO_QRLLIB_PIN: 6f9978367906233874b406bd5d55b0e8b8d01d9c # v0.9.0 (2026-06-10)

jobs:
  mldsa87-cross-verify:
    name: ML-DSA-87 Cross-Verification (wallet.js <-> go-qrllib)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wallet.js
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.x'

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.x'

      - name: Install wallet.js dependencies
        run: npm ci

      - name: Clone go-qrllib (pinned)
        run: |
          git clone https://github.com/theQRL/go-qrllib.git /tmp/go-qrllib
          git -C /tmp/go-qrllib checkout "$GO_QRLLIB_PIN"
          echo "go-qrllib commit: $(git -C /tmp/go-qrllib rev-parse --short HEAD)"

      - name: Generate wallet.js ML-DSA-87 signature
        run: node .github/cross-verify/wallet_sign.js

      - name: Verify wallet.js signature with go-qrllib
        run: |
          echo "=== Verifying wallet.js ML-DSA-87 signature with go-qrllib ==="
          cd /tmp/go-qrllib && go run "$GITHUB_WORKSPACE/.github/cross-verify/wallet_verify.go"
          echo "wallet.js -> go-qrllib: PASSED"

      - name: Generate go-qrllib ML-DSA-87 signature
        run: |
          cd /tmp/go-qrllib
          go run "$GITHUB_WORKSPACE/.github/cross-verify/wallet_sign_goqrllib.go"

      - name: Verify go-qrllib signature with wallet.js
        run: |
          echo "=== Verifying go-qrllib ML-DSA-87 signature with wallet.js ==="
          node .github/cross-verify/wallet_verify.js
          echo "go-qrllib -> wallet.js: PASSED"
